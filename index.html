<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <!-- Lucide Icons for professional touch -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-accent: #ef4444; /* Red */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #450a0a 0%, #7f1d1d 50%, #991b1b 100%);
            overflow: hidden;
        }

        /* Decorative Background Blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary-accent);
            filter: blur(120px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
        }

        .blob-1 { top: -10%; left: -10%; background: #f43f5e; }
        .blob-2 { bottom: -10%; right: -10%; background: #fb923c; }

        /* Glass Card */
        .profile-card {
            width: 350px;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: var(--text-main);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Profile Image Container */
        .image-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
        }

        .image-container::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px dashed var(--glass-border);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Typography */
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .stream-tag {
            display: inline-block;
            background: linear-gradient(90deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .bio {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        /* Social Icons Section */
        .socials {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .social-icon {
            color: var(--text-secondary);
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .social-icon:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .profile-card {
                width: 90%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="profile-card">
        <div class="image-container">
            <!-- Placeholder Image using Unsplash -->
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=256&h=256&auto=format&fit=crop" 
                 alt="Student Profile" 
                 class="profile-image">
        </div>

        <h1>Alex Rivers</h1>
        <div class="stream-tag">Computer Science</div>
        
        <p class="bio">
            Passionate software engineering student focused on building intuitive user interfaces and exploring the world of AI. Always learning, one commit at a time.
        </p>

        <div class="socials">
            <i data-lucide="github" class="social-icon"></i>
            <i data-lucide="twitter" class="social-icon"></i>
            <i data-lucide="linkedin" class="social-icon"></i>
            <i data-lucide="mail" class="social-icon"></i>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
